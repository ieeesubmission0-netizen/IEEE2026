tosca_definitions_version: tosca_simple_yaml_1_0

imports:
  - indigo_custom_types: https://raw.githubusercontent.com/indigo-dc/tosca-types/master/custom_types.yaml

description: >
  TOSCA examples for specifying Marathon applications to enable the
  specification of long-running services in INDIGO.

topology_template:

  
  node_templates:

    marathon-app:
      type: tosca.nodes.Container.Application
      properties:
        # environment_variables: 
        uris: []
        labels:
          HAPROXY_GROUP: external
      
      requirements:
        - host: docker_runtime
        - storage: object
        - network:  IPv4_Network
    docker_runtime:
      type:  tosca.nodes.Container.Runtime
      capabilities:
        host:
          properties:
            num_cpus: { get_input: cpus}
            mem_size: { get_input: mem}
            publish_ports:
               - protocol: tcp
                 source: { get_input: port}
            volumes: [ { concat: [ 'marathon:', get_input: data_path, ':rw:dvdi:rexray'] } ]
      requirements:
        - host: compute
    IPv4_Network:
      type: Network
      properties:
        ip_version: 4
      capabilities:
        link: {}
    object:
      type: tosca.nodes.Storage.ObjectStorage
      properties:
        name: object
    compute:
      type: tosca.nodes.Compute
      capabilities:
        endpoint:
          properties:
            network_name: PUBLIC
            ports:
              http_port:
                protocol: tcp
                source: 80
              https_port:
                protocol: tcp
                source: 443