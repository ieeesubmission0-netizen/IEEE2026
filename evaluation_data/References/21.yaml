tosca_definitions_version: tosca_simple_yaml_1_0

imports:
  - indigo_custom_types: https://raw.githubusercontent.com/indigo-dc/tosca-types/master/custom_types.yaml

description: >
  TOSCA test for launching the Wine Cellar Application (PHP Version)
  (https://github.com/ccoenraets/wine-cellar-php) as an example of
  a two tier application with an Apache web server and a MySQL DB

topology_template:
 
      
  node_templates:
  
    cellar_app:
      type: tosca.nodes.WebApplication
      requirements:
        - host: apache
        - database_connection: test_db
      
  
    apache:
      type: tosca.nodes.WebServer
      requirements:
        - host: web_server
 
    web_server:
      type: tosca.nodes.Compute
      capabilities:
        endpoint:
          properties:
            network_name: PUBLIC
            ports:
              http_port:
                protocol: tcp
                source: 80
              https_port:
                protocol: tcp
                source: 443
        # Host container properties
        host:
         properties:
           num_cpus: 1
           mem_size: 1 GB
        # Guest Operating System properties
        os:
          properties:
            # host Operating System image properties
            type: linux 
            distribution: ubuntu 
 
    test_db:
      type: tosca.nodes.indigo.Database
      properties:
        name: { get_input: db_name }
        user: { get_input: db_user }
        password: { get_input: db_password }
        root_password: { get_input: mysql_root_password }
      
      requirements:
        - host: mysql
          
    
    mysql:
      type: tosca.nodes.DBMS
      properties:
        root_password: { get_input: mysql_root_password }
      requirements:
        - host: db_server
        
 
    db_server:
      type: tosca.nodes.Compute
      capabilities:
       
        host:
         properties:
           num_cpus: 1
           disk_size: 10 GB
           mem_size: 4 GB
        os:
         properties:
           architecture: x86_64
           type: linux
           distribution: ubuntu

 
